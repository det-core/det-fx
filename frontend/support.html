<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Support — DET Trades</title>
<meta name="theme-color" content="#060B18">
<link rel="stylesheet" href="/css/style.css">
<style>
  body { overflow: hidden; }
  .support-layout { display: flex; flex-direction: column; height: 100vh; }
  .messages-area { flex:1; overflow-y:auto; padding:calc(var(--nav-h) + 8px) 12px calc(var(--bottom-nav-h) + 72px); display:flex; flex-direction:column; gap:4px; }
  .msg-bubble { display:flex; gap:8px; padding:4px 0; animation:fadeUp 0.2s ease; }
  .msg-bubble.own { flex-direction:row-reverse; }
  .msg-text { max-width:78%; background:var(--panel2); border:1px solid var(--border); border-radius:12px 12px 12px 2px; padding:10px 14px; font-size:0.88rem; color:var(--text); line-height:1.5; word-break:break-word; }
  .msg-bubble.own .msg-text { background:var(--cyan-dim); border-color:var(--cyan-glow); border-radius:12px 12px 2px 12px; }
  .msg-bubble.admin-msg .msg-text { background:linear-gradient(135deg,rgba(240,180,41,0.08),rgba(0,212,255,0.05)); border-color:var(--gold-glow); }
  .msg-name { font-family:var(--font-display); font-size:0.6rem; color:var(--text-muted); margin-bottom:3px; }
  .msg-time { font-size:0.6rem; color:var(--text-muted); margin-top:2px; font-family:var(--font-mono); }
  .msg-bubble.own .msg-time { text-align:right; }
  .chat-input-bar { position:fixed; bottom:var(--bottom-nav-h); left:0; right:0; background:rgba(10,16,32,0.97); backdrop-filter:blur(16px); border-top:1px solid var(--border); padding:10px 12px; display:flex; align-items:flex-end; gap:8px; z-index:99; }
  .chat-input-wrap { flex:1; background:var(--panel); border:1px solid var(--border); border-radius:20px; padding:8px 14px; transition:border-color 0.2s; }
  .chat-input-wrap:focus-within { border-color:var(--gold); }
  .chat-input { width:100%; background:none; border:none; color:var(--text); font-size:0.9rem; resize:none; max-height:100px; font-family:var(--font-body); }
  .chat-input:focus { outline:none; }
  .send-btn { width:36px; height:36px; border-radius:50%; background:var(--gold); color:var(--bg); display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; border:none; }
  .admin-notice { background:var(--gold-dim); border:1px solid var(--gold-glow); border-radius:var(--radius); padding:10px 14px; margin:8px 12px; font-size:0.8rem; color:var(--gold); text-align:center; }
</style>
</head>
<body>
<div class="support-layout">
  <nav class="top-nav">
    <div style="display:flex;align-items:center;gap:10px">
      <a href="/profile.html" style="color:var(--text-muted);font-size:1.1rem">←</a>
      <div>
        <div class="nav-logo" style="font-size:0.85rem">SUPPORT CHAT</div>
        <div style="font-size:0.65rem;color:var(--text-muted)">Admin response within 24hrs</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <div style="width:6px;height:6px;background:var(--success);border-radius:50%;animation:pulse 1.5s infinite"></div>
      <span style="font-size:0.7rem;color:var(--success)">Online</span>
    </div>
  </nav>

  <div class="admin-notice">🎧 Monthly member support — Admin will respond shortly</div>

  <div class="messages-area" id="messages-area">
    <div style="text-align:center;padding:40px"><div class="spinner spinner-lg"></div></div>
  </div>

  <div class="chat-input-bar">
    <div class="chat-input-wrap">
      <textarea class="chat-input" id="chat-input" placeholder="Describe your issue..." rows="1" maxlength="1000"></textarea>
    </div>
    <button class="send-btn" onclick="sendMessage()">↑</button>
  </div>
</div>

<nav class="bottom-nav">
  <a href="/dashboard.html" class="bottom-nav-item"><span class="icon">🏠</span><span>Home</span></a>
  <a href="/analysis.html" class="bottom-nav-item"><span class="icon">📊</span><span>Analyze</span></a>
  <a href="/signals.html" class="bottom-nav-item"><span class="icon">📡</span><span>Signals</span></a>
  <a href="/chat.html" class="bottom-nav-item"><span class="icon">💬</span><span>Chat</span></a>
  <a href="/profile.html" class="bottom-nav-item active"><span class="icon">👤</span><span>Profile</span></a>
</nav>

<div id="toast-container"></div>
<script src="/js/config.js"></script><script src="/js/app.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onChildAdded, limitToLast, query as rtQuery } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  if (!Auth.requireAuth()) throw new Error("redirect");
  const user = Auth.getUser();
  const plan = user.effective_plan || user.subscription?.plan || "free";
  if (plan !== "monthly") { window.location.href = "/pricing.html"; }

  const app = initializeApp(DET_CONFIG.FIREBASE);
  const db = getDatabase(app);
  const messagesArea = document.getElementById("messages-area");

  const input = document.getElementById("chat-input");
  input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight,100)+"px"; });
  input.addEventListener("keydown", e => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

  function renderMsg(msg) {
    const isOwn = msg.uid === user.uid;
    const isAdmin = msg.role === "admin" || msg.role === "superadmin";
    const time = new Date(msg.timestamp).toLocaleTimeString("en-NG",{hour:"2-digit",minute:"2-digit"});
    return `<div class="msg-bubble ${isOwn?"own":""} ${isAdmin?"admin-msg":""}">
      <div>
        ${!isOwn ? `<div class="msg-name">${isAdmin?"🎧 ADMIN":msg.username}</div>` : ""}
        <div class="msg-text">${msg.text||""}</div>
        <div class="msg-time">${time}</div>
      </div>
    </div>`;
  }

  async function loadMessages() {
    const data = await API.get(`/chat/support/thread`);
    messagesArea.innerHTML = "";
    if (data?.success && data.messages.length) {
      data.messages.reverse().forEach(m => messagesArea.insertAdjacentHTML("beforeend", renderMsg(m)));
    } else {
      messagesArea.innerHTML = `<div class="empty-state"><div class="icon">🎧</div><p>No messages yet. Send us a message and we'll respond shortly.</p></div>`;
    }
    scrollToBottom();
  }

  let listenStart = Date.now();
  const chatRef = rtQuery(ref(db, `support_chat/${user.uid}`), limitToLast(1));
  onChildAdded(chatRef, snap => {
    const msg = snap.val();
    if (!msg || msg.timestamp < listenStart - 2000) return;
    const empty = messagesArea.querySelector(".empty-state");
    if (empty) empty.remove();
    messagesArea.insertAdjacentHTML("beforeend", renderMsg(msg));
    scrollToBottom();
  });

  window.sendMessage = async function() {
    const text = input.value.trim();
    if (!text) return;
    input.value = ""; input.style.height = "auto";
    const data = await API.post("/chat/support/message", { text });
    if (!data?.success) Toast.error(data?.message || "Failed to send");
  };

  function scrollToBottom() { setTimeout(() => { messagesArea.scrollTop = messagesArea.scrollHeight; }, 50); }
  loadMessages();
  listenStart = Date.now();
</script>
</body>
</html>
