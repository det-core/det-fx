<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Upgrade — DET Trades</title>
<meta name="theme-color" content="#060B18">
<link rel="stylesheet" href="/css/style.css">
<style>
  .plan-card { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; margin-bottom:14px; position:relative; overflow:hidden; transition:all 0.2s; }
  .plan-card.featured { border-color:var(--gold-glow); background:linear-gradient(135deg,var(--panel),rgba(240,180,41,0.05)); }
  .plan-card.featured::before { content:'MOST POPULAR'; position:absolute; top:16px; right:-18px; background:var(--gold); color:var(--bg); font-family:var(--font-display); font-size:0.5rem; letter-spacing:1px; padding:3px 28px; transform:rotate(45deg); }
  .plan-name { font-family:var(--font-display); font-size:0.75rem; letter-spacing:2px; color:var(--text-muted); margin-bottom:6px; }
  .plan-price { font-family:var(--font-display); font-size:2rem; font-weight:900; color:var(--text); }
  .plan-price span { font-size:0.85rem; color:var(--text-muted); font-weight:400; }
  .plan-features { margin:16px 0; display:flex; flex-direction:column; gap:8px; }
  .plan-feat { display:flex; align-items:center; gap:8px; font-size:0.85rem; color:var(--text-dim); }
  .plan-feat .yes { color:var(--success); } .plan-feat .no { opacity:0.4; }
  .coupon-box { background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin:16px; }
  .coupon-row { display:flex; gap:8px; }
  .coupon-result { margin-top:8px; font-size:0.8rem; padding:8px 12px; border-radius:var(--radius); display:none; }
  .coupon-result.valid { background:rgba(0,255,136,0.1); color:var(--success); border:1px solid rgba(0,255,136,0.3); }
  .coupon-result.invalid { background:rgba(255,59,92,0.1); color:var(--danger); border:1px solid rgba(255,59,92,0.3); }
</style>
</head>
<body>
<nav class="top-nav">
  <div style="display:flex;align-items:center;gap:10px">
    <a href="/dashboard.html" style="color:var(--text-muted);font-size:1.1rem">←</a>
    <div class="nav-logo">UPGRADE</div>
  </div>
</nav>
<div class="app-container">
  <div class="page-header">
    <h2>Choose Your <span style="color:var(--gold)">Plan</span></h2>
    <p>Unlock full AI analysis, signals, and more</p>
  </div>
  <div style="padding:0 16px" id="plans-container">
    <div style="text-align:center;padding:40px"><div class="spinner spinner-lg"></div></div>
  </div>
  <div class="coupon-box">
    <p class="section-title" style="margin-bottom:10px">HAVE A COUPON?</p>
    <div class="coupon-row">
      <input type="text" class="input" id="coupon-input" placeholder="Enter coupon code" style="text-transform:uppercase;flex:1">
      <button class="btn btn-outline btn-sm" onclick="applyCoupon()" style="width:auto;flex-shrink:0">APPLY</button>
    </div>
    <div class="coupon-result" id="coupon-result"></div>
  </div>
  <div class="watermark">DET TRADES · DARK EMPIRE TECHNOLOGIES</div>
</div>
<nav class="bottom-nav">
  <a href="/dashboard.html" class="bottom-nav-item"><span class="icon">🏠</span><span>Home</span></a>
  <a href="/analysis.html" class="bottom-nav-item"><span class="icon">📊</span><span>Analyze</span></a>
  <a href="/signals.html" class="bottom-nav-item"><span class="icon">📡</span><span>Signals</span></a>
  <a href="/chat.html" class="bottom-nav-item"><span class="icon">💬</span><span>Chat</span></a>
  <a href="/profile.html" class="bottom-nav-item"><span class="icon">👤</span><span>Profile</span></a>
</nav>
<div id="toast-container"></div>
<script src="/js/config.js"></script><script src="/js/app.js"></script>
<script>
  if (!Auth.requireAuth()) throw new Error("redirect");
  let activeCoupon = null;

  async function loadPlans() {
    const data = await API.get("/subscription/plans");
    if (!data?.success) return;
    const { weekly, monthly } = data.plans;
    document.getElementById("plans-container").innerHTML = `
      <div class="plan-card">
        <div class="plan-name">FREE</div>
        <div class="plan-price">₦0 <span>/ forever</span></div>
        <div class="plan-features">
          <div class="plan-feat"><span class="yes">✓</span> 3 analyses per day</div>
          <div class="plan-feat"><span class="yes">✓</span> TP1 only</div>
          <div class="plan-feat"><span class="yes">✓</span> Community chat</div>
          <div class="plan-feat"><span class="no">✕</span> AI reasoning</div>
          <div class="plan-feat"><span class="no">✕</span> Risk calculator</div>
          <div class="plan-feat"><span class="no">✕</span> History</div>
        </div>
        <button class="btn btn-outline" disabled>CURRENT / DEFAULT</button>
      </div>
      <div class="plan-card">
        <div class="plan-name">WEEKLY</div>
        <div class="plan-price">${weekly.price_display} <span>/ week</span></div>
        <div class="plan-features">
          <div class="plan-feat"><span class="yes">✓</span> 15 analyses per week (3/day)</div>
          <div class="plan-feat"><span class="yes">✓</span> TP1, TP2, TP3</div>
          <div class="plan-feat"><span class="yes">✓</span> Full AI reasoning</div>
          <div class="plan-feat"><span class="yes">✓</span> Risk calculator & lot size</div>
          <div class="plan-feat"><span class="yes">✓</span> Analysis history</div>
          <div class="plan-feat"><span class="no">✕</span> Signal feed</div>
        </div>
        <button class="btn btn-outline" style="border-color:var(--cyan);color:var(--cyan)" onclick="subscribe('weekly')">GET WEEKLY →</button>
      </div>
      <div class="plan-card featured">
        <div class="plan-name">MONTHLY</div>
        <div class="plan-price">${monthly.price_display} <span>/ month</span></div>
        <div class="plan-features">
          <div class="plan-feat"><span class="yes">✓</span> Unlimited analyses</div>
          <div class="plan-feat"><span class="yes">✓</span> TP1, TP2, TP3</div>
          <div class="plan-feat"><span class="yes">✓</span> Full AI reasoning</div>
          <div class="plan-feat"><span class="yes">✓</span> Risk calculator & lot size</div>
          <div class="plan-feat"><span class="yes">✓</span> Signal feed access</div>
          <div class="plan-feat"><span class="yes">✓</span> Priority admin support</div>
        </div>
        <button class="btn btn-gold" onclick="subscribe('monthly')">GET MONTHLY →</button>
      </div>`;
  }

  async function subscribe(plan) {
    const data = await API.post("/subscription/initialize", {
      plan,
      coupon_code: activeCoupon || undefined,
    });
    if (!data?.success) { Toast.error(data?.message || "Payment init failed"); return; }
    window.location.href = data.authorization_url;
  }

  async function applyCoupon() {
    const code = document.getElementById("coupon-input").value.trim().toUpperCase();
    if (!code) return;
    const resultEl = document.getElementById("coupon-result");
    resultEl.style.display = "block";
    resultEl.className = "coupon-result";
    resultEl.textContent = "Checking...";
    // We validate on the backend at subscription time — just store the code
    activeCoupon = code;
    resultEl.className = "coupon-result valid";
    resultEl.textContent = `✅ Coupon "${code}" will be applied at checkout`;
  }

  loadPlans();
</script>
</body>
</html>
