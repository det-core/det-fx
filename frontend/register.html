<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Register — DET Trades</title>
<meta name="theme-color" content="#060B18">
<link rel="stylesheet" href="/css/style.css">
<style>
  .auth-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
  }
  .auth-page::before {
    content: '';
    position: fixed;
    top: -100px; left: 50%;
    transform: translateX(-50%);
    width: 500px; height: 500px;
    background: radial-gradient(ellipse, rgba(240,180,41,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .auth-card {
    width: 100%;
    max-width: 420px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 32px 24px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.4s ease;
  }
  .auth-logo { text-align: center; margin-bottom: 24px; }
  .auth-logo .brand { font-family: var(--font-display); font-size: 1.4rem; font-weight: 900; color: var(--cyan); letter-spacing: 3px; }
  .auth-logo .brand span { color: var(--gold); }
  .auth-logo .sub { font-family: var(--font-display); font-size: 0.6rem; letter-spacing: 3px; color: var(--text-muted); margin-top: 4px; }
  .auth-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .auth-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 24px; }
  .referral-banner {
    background: var(--gold-dim);
    border: 1px solid var(--gold-glow);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 0.8rem;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .terms-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 20px;
    font-size: 0.82rem;
    color: var(--text-dim);
  }
  .terms-row input { accent-color: var(--cyan); min-width: 16px; margin-top: 2px; }
  .strength-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0; }
  .back-home { display: flex; align-items: center; gap: 6px; font-family: var(--font-display); font-size: 0.7rem; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 24px; max-width: 420px; width: 100%; }
  .back-home:hover { color: var(--cyan); }
  .perks { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .perk { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-dim); }
  .perk .dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; }
</style>
</head>
<body>
<div style="position:relative;z-index:1">
  <div class="auth-page">
    <a href="/" class="back-home">← BACK TO HOME</a>

    <div class="auth-card">
      <div class="auth-logo">
        <div class="brand">DET<span>●</span>TRADES</div>
        <div class="sub">DARK EMPIRE TECHNOLOGIES</div>
      </div>

      <div class="auth-title">Create Your Account</div>
      <div class="auth-sub">Join thousands of smarter traders</div>

      <div class="perks">
        <div class="perk"><span class="dot"></span> Free forever</div>
        <div class="perk"><span class="dot"></span> 3 analyses/day</div>
        <div class="perk"><span class="dot"></span> No card needed</div>
      </div>

      <div class="referral-banner hidden" id="ref-banner">
        🎁 <span id="ref-banner-text">You were referred! You'll get a bonus analysis on signup.</span>
      </div>

      <form id="register-form">
        <div class="input-group">
          <label class="input-label">USERNAME</label>
          <div class="input-icon">
            <span class="icon">👤</span>
            <input type="text" class="input" id="username" placeholder="YourTradeName" required minlength="3" maxlength="24" autocomplete="username">
          </div>
          <span style="font-size:0.72rem;color:var(--text-muted)" id="username-hint"></span>
        </div>

        <div class="input-group">
          <label class="input-label">EMAIL ADDRESS</label>
          <div class="input-icon">
            <span class="icon">✉</span>
            <input type="email" class="input" id="email" placeholder="trader@email.com" required autocomplete="email">
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">PASSWORD</label>
          <div class="input-icon">
            <span class="icon">🔒</span>
            <input type="password" class="input" id="password" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
            <button type="button" id="toggle-pw" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;color:var(--text-muted);font-size:0.85rem">👁</button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <span style="font-size:0.7rem;color:var(--text-muted)" id="strength-label"></span>
        </div>

        <div class="input-group">
          <label class="input-label">REFERRAL CODE <span style="color:var(--text-muted)">(optional)</span></label>
          <div class="input-icon">
            <span class="icon">🎁</span>
            <input type="text" class="input" id="referral-code" placeholder="e.g. ABC12345" maxlength="8" style="text-transform:uppercase">
          </div>
        </div>

        <div class="terms-row">
          <input type="checkbox" id="terms" required>
          <label for="terms">I agree to the Terms of Service. DET Trades is an AI analysis tool — not financial advice. Trade at your own risk.</label>
        </div>

        <button type="submit" class="btn btn-primary" id="register-btn">CREATE ACCOUNT →</button>
      </form>

      <div style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--text-muted)">
        Already have an account? <a href="/login.html" style="color:var(--cyan)">Sign in</a>
      </div>
    </div>

    <div class="watermark" style="margin-top:24px">© 2025 DARK EMPIRE TECHNOLOGIES</div>
  </div>
</div>

<div id="toast-container"></div>

<script src="/js/config.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const existingToken = localStorage.getItem("det_token") || sessionStorage.getItem("det_token");
  if (existingToken) window.location.href = "/dashboard.html";

  const app = initializeApp(DET_CONFIG.FIREBASE);
  const auth = getAuth(app);

  // Check referral code from URL
  const urlParams = new URLSearchParams(window.location.search);
  const refCode = urlParams.get("ref");
  if (refCode) {
    document.getElementById("referral-code").value = refCode.toUpperCase();
    document.getElementById("ref-banner").classList.remove("hidden");
  }

  function toast(msg, type = "info") {
    const c = document.getElementById("toast-container");
    const icons = { success:"✅", error:"❌", info:"ℹ️", warning:"⚠️" };
    const el = document.createElement("div");
    el.className = `toast ${type}`;
    el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
    c.appendChild(el);
    setTimeout(() => { el.style.animation = "slideOut 0.3s ease forwards"; setTimeout(() => el.remove(), 300); }, 4000);
  }

  // Password toggle
  document.getElementById("toggle-pw").onclick = () => {
    const pw = document.getElementById("password");
    pw.type = pw.type === "password" ? "text" : "password";
  };

  // Password strength
  document.getElementById("password").addEventListener("input", (e) => {
    const val = e.target.value;
    const fill = document.getElementById("strength-fill");
    const label = document.getElementById("strength-label");
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const colors = ["#FF3B5C","#FF3B5C","#FFB800","#00FF88","#00FF88"];
    const labels = ["","Weak","Fair","Good","Strong"];
    fill.style.width = `${(score/4)*100}%`;
    fill.style.background = colors[score] || "transparent";
    label.textContent = labels[score] || "";
    label.style.color = colors[score] || "transparent";
  });

  // Username hint
  document.getElementById("username").addEventListener("input", (e) => {
    const val = e.target.value;
    const hint = document.getElementById("username-hint");
    if (val.length > 0 && val.length < 3) hint.textContent = "Min 3 characters";
    else hint.textContent = "";
  });

  // Register
  document.getElementById("register-form").onsubmit = async (e) => {
    e.preventDefault();
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const referral_code = document.getElementById("referral-code").value.trim().toUpperCase() || null;
    const terms = document.getElementById("terms").checked;
    const btn = document.getElementById("register-btn");

    if (!terms) { toast("Please accept the terms", "error"); return; }

    btn.dataset.orig = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span> Creating account...';
    btn.disabled = true;

    try {
      // Create Firebase user
      await createUserWithEmailAndPassword(auth, email, password);

      // Register on backend
      const res = await fetch(`${DET_CONFIG.API_BASE}/auth/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password, username, referral_code }),
      });
      const data = await res.json();

      if (!data.success) {
        toast(data.message || "Registration failed", "error");
        btn.innerHTML = btn.dataset.orig;
        btn.disabled = false;
        return;
      }

      sessionStorage.setItem("det_token", data.token);
      sessionStorage.setItem("det_user", JSON.stringify(data.user));

      toast("Account created! Welcome to DET Trades 🚀", "success");
      setTimeout(() => window.location.href = "/dashboard.html", 1000);

    } catch (err) {
      let msg = "Registration failed. Try again.";
      if (err.code === "auth/email-already-in-use") msg = "Email already registered. Try logging in.";
      if (err.code === "auth/weak-password") msg = "Password too weak. Use at least 6 characters.";
      toast(msg, "error");
      btn.innerHTML = btn.dataset.orig;
      btn.disabled = false;
    }
  };
</script>
</body>
</html>
