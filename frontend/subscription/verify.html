<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Verifying Payment — DET Trades</title>
<meta name="theme-color" content="#060B18">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="loading-screen">
  <div class="logo">DET<span style="color:var(--gold)">●</span>TRADES</div>
  <div class="spinner spinner-lg"></div>
  <div style="font-family:var(--font-display);font-size:0.7rem;letter-spacing:3px;color:var(--text-muted)" id="status-text">VERIFYING PAYMENT</div>
  <div style="font-size:0.8rem;color:var(--text-muted);max-width:260px;text-align:center;margin-top:8px" id="status-sub">Please wait while we confirm your subscription...</div>
</div>
<div id="toast-container"></div>
<script src="/js/config.js"></script><script src="/js/app.js"></script>
<script>
  async function verify() {
    const params = new URLSearchParams(window.location.search);
    const reference = params.get("reference") || params.get("trxref");

    if (!reference) {
      document.getElementById("status-text").textContent = "INVALID REFERENCE";
      document.getElementById("status-sub").textContent = "No payment reference found.";
      setTimeout(() => window.location.href = "/pricing.html", 2000);
      return;
    }

    const data = await API.get(`/subscription/verify/${reference}`);

    if (data?.success) {
      document.getElementById("status-text").textContent = "PAYMENT CONFIRMED ✅";
      document.getElementById("status-sub").textContent = `${data.plan?.toUpperCase()} plan activated! Redirecting to dashboard...`;
      // Refresh user data
      const meData = await API.get("/auth/me");
      if (meData?.success) {
        const remember = localStorage.getItem("det_remember") === "1";
        const store = remember ? localStorage : sessionStorage;
        store.setItem("det_user", JSON.stringify(meData.user));
      }
      Toast.success("Subscription activated!");
      setTimeout(() => window.location.href = "/dashboard.html", 2000);
    } else {
      document.getElementById("status-text").textContent = "VERIFICATION FAILED";
      document.getElementById("status-sub").textContent = data?.message || "Payment could not be verified. Contact support if charged.";
      setTimeout(() => window.location.href = "/pricing.html", 3000);
    }
  }

  if (Auth.isLoggedIn()) {
    verify();
  } else {
    window.location.href = "/login.html";
  }
</script>
</body>
</html>
