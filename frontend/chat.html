<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chat — DET Trades</title>
<meta name="theme-color" content="#060B18">
<link rel="stylesheet" href="/css/style.css">
<style>
  body { overflow: hidden; }
  .chat-layout {
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: relative;
  }
  .chat-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: rgba(6,11,24,0.95);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 100;
  }
  .chat-title { font-family: var(--font-display); font-size: 0.9rem; font-weight: 700; letter-spacing: 1px; }
  .online-count { font-size: 0.75rem; color: var(--success); display: flex; align-items: center; gap: 4px; }
  .online-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 1.5s infinite; }
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: calc(var(--nav-h) + 8px) 12px calc(var(--bottom-nav-h) + 72px);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .msg-group { margin-bottom: 4px; }
  .msg-bubble {
    display: flex;
    gap: 8px;
    padding: 4px 0;
    animation: fadeUp 0.2s ease;
  }
  .msg-bubble.own { flex-direction: row-reverse; }
  .msg-avatar {
    width: 30px; height: 30px;
    min-width: 30px;
    border-radius: 50%;
    background: var(--panel2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 0.65rem;
    color: var(--cyan);
    overflow: hidden;
    align-self: flex-end;
  }
  .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .msg-content { max-width: 75%; }
  .msg-username {
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .msg-bubble.own .msg-username { justify-content: flex-end; }
  .admin-tag {
    background: linear-gradient(135deg, var(--gold-dim), var(--cyan-dim));
    color: var(--gold);
    font-size: 0.55rem;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: var(--font-display);
    letter-spacing: 0.5px;
  }
  .monthly-tag { background: var(--gold-dim); color: var(--gold); font-size: 0.55rem; padding: 1px 5px; border-radius: 3px; }
  .weekly-tag { background: var(--cyan-dim); color: var(--cyan); font-size: 0.55rem; padding: 1px 5px; border-radius: 3px; }
  .msg-text {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 12px 12px 12px 2px;
    padding: 8px 12px;
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.5;
    word-break: break-word;
  }
  .msg-bubble.own .msg-text {
    background: var(--cyan-dim);
    border-color: var(--cyan-glow);
    border-radius: 12px 12px 2px 12px;
    color: var(--text);
  }
  .msg-bubble.admin .msg-text {
    background: linear-gradient(135deg, rgba(240,180,41,0.08), rgba(0,212,255,0.05));
    border-color: var(--gold-glow);
  }
  .msg-image {
    max-width: 200px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid var(--border);
  }
  .msg-time { font-size: 0.6rem; color: var(--text-muted); margin-top: 3px; font-family: var(--font-mono); }
  .msg-bubble.own .msg-time { text-align: right; }
  /* Input bar */
  .chat-input-bar {
    position: fixed;
    bottom: var(--bottom-nav-h);
    left: 0; right: 0;
    background: rgba(10,16,32,0.97);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    z-index: 99;
  }
  .chat-input-wrap {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 14px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .chat-input-wrap:focus-within { border-color: var(--cyan); }
  .chat-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-size: 0.9rem;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
    font-family: var(--font-body);
  }
  .chat-input:focus { outline: none; }
  .img-btn, .send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    transition: all 0.15s;
    flex-shrink: 0;
    border: none;
  }
  .img-btn { background: var(--panel2); color: var(--text-muted); }
  .img-btn:hover { color: var(--cyan); }
  .send-btn { background: var(--cyan); color: var(--bg); }
  .send-btn:hover { background: #00b8de; }
  .send-btn:disabled { opacity: 0.5; }
  /* Image lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    display: none;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 85vh; border-radius: var(--radius); }
  .lightbox-close { position: absolute; top: 16px; right: 16px; color: #fff; font-size: 1.5rem; cursor: pointer; background: rgba(0,0,0,0.5); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; }
  /* Date divider */
  .date-divider { text-align: center; margin: 10px 0; }
  .date-divider span { font-size: 0.65rem; color: var(--text-muted); font-family: var(--font-display); background: var(--bg); padding: 2px 10px; border-radius: 100px; border: 1px solid var(--border); }
  .support-btn {
    background: var(--gold-dim);
    border: 1px solid var(--gold-glow);
    border-radius: var(--radius);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--gold);
    font-family: var(--font-display);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<!-- Image Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="Chat image">
</div>

<div class="chat-layout">

  <!-- Chat Header -->
  <div class="chat-header">
    <div>
      <div class="chat-title">🌐 COMMUNITY CHAT</div>
      <div class="online-count"><span class="online-dot"></span> Live</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <a href="/notifications.html" class="nav-notif-btn">🔔<span class="notif-badge hidden" id="notif-badge"></span></a>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages-area" id="messages-area">
    <div style="text-align:center;padding:40px"><div class="spinner spinner-lg"></div></div>
  </div>

  <!-- Input Bar -->
  <div class="chat-input-bar">
    <div class="chat-input-wrap">
      <textarea class="chat-input" id="chat-input" placeholder="Say something to the traders..." rows="1" maxlength="1000"></textarea>
    </div>
    <input type="file" id="img-input" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="sendImage(this)">
    <button class="img-btn" onclick="document.getElementById('img-input').click()" title="Send image">📎</button>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a href="/dashboard.html" class="bottom-nav-item" data-page="dashboard.html"><span class="icon">🏠</span><span>Home</span></a>
  <a href="/analysis.html" class="bottom-nav-item" data-page="analysis.html"><span class="icon">📊</span><span>Analyze</span></a>
  <a href="/signals.html" class="bottom-nav-item" data-page="signals.html"><span class="icon">📡</span><span>Signals</span></a>
  <a href="/chat.html" class="bottom-nav-item active" data-page="chat.html"><span class="icon">💬</span><span>Chat</span></a>
  <a href="/profile.html" class="bottom-nav-item" data-page="profile.html"><span class="icon">👤</span><span>Profile</span></a>
</nav>

<div id="toast-container"></div>
<script src="/js/config.js"></script>
<script src="/js/app.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onChildAdded, limitToLast, query as rtQuery } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  if (!Auth.requireAuth()) throw new Error("redirect");

  const user = Auth.getUser();
  const plan = user.effective_plan || user.subscription?.plan || "free";

  const app = initializeApp(DET_CONFIG.FIREBASE);
  const db = getDatabase(app);

  const messagesArea = document.getElementById("messages-area");
  let firstLoad = true;
  let lastDate = null;

  // Auto-resize textarea
  const input = document.getElementById("chat-input");
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 100) + "px";
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function getPlanTag(msgPlan, role) {
    if (role === "admin" || role === "superadmin") return `<span class="admin-tag">ADMIN</span>`;
    if (msgPlan === "monthly") return `<span class="monthly-tag">MONTHLY</span>`;
    if (msgPlan === "weekly") return `<span class="weekly-tag">WEEKLY</span>`;
    return "";
  }

  function renderMessage(msg) {
    const isOwn = msg.uid === user.uid;
    const isAdmin = msg.role === "admin" || msg.role === "superadmin";
    const msgDate = new Date(msg.timestamp).toDateString();

    let dateHTML = "";
    if (msgDate !== lastDate) {
      lastDate = msgDate;
      const label = msgDate === new Date().toDateString() ? "Today" : msgDate;
      dateHTML = `<div class="date-divider"><span>${label}</span></div>`;
    }

    const avatarLetter = msg.username?.charAt(0).toUpperCase() || "?";
    const avatarHTML = msg.avatar_url
      ? `<div class="msg-avatar"><img src="${msg.avatar_url}" alt="${msg.username}"></div>`
      : `<div class="msg-avatar" style="${isAdmin ? "border-color:var(--gold);color:var(--gold)" : ""}">${avatarLetter}</div>`;

    const contentHTML = msg.type === "image"
      ? `<img src="${msg.image_url}" class="msg-image" onclick="openLightbox('${msg.image_url}')" alt="image" loading="lazy">`
      : `<div class="msg-text">${escapeHTML(msg.text || "")}</div>`;

    const time = new Date(msg.timestamp).toLocaleTimeString("en-NG", { hour: "2-digit", minute: "2-digit" });

    return `${dateHTML}
      <div class="msg-bubble ${isOwn ? "own" : ""} ${isAdmin ? "admin" : ""}">
        ${!isOwn ? avatarHTML : ""}
        <div class="msg-content">
          ${!isOwn ? `<div class="msg-username">${msg.username} ${getPlanTag(msg.plan, msg.role)}</div>` : ""}
          ${contentHTML}
          <div class="msg-time">${time}</div>
        </div>
        ${isOwn ? avatarHTML : ""}
      </div>`;
  }

  function escapeHTML(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // Load initial messages via REST, then listen for new ones
  async function loadInitialMessages() {
    const data = await API.get("/chat/community/messages?limit=50");
    messagesArea.innerHTML = "";
    if (data?.success && data.messages.length) {
      data.messages.reverse().forEach(msg => {
        messagesArea.insertAdjacentHTML("beforeend", renderMessage(msg));
      });
    } else {
      messagesArea.innerHTML = `<div class="empty-state"><div class="icon">💬</div><p>No messages yet. Say hi to the community!</p></div>`;
    }
    scrollToBottom();
    firstLoad = false;
  }

  // Listen for new real-time messages
  const chatRef = rtQuery(ref(db, "community_chat"), limitToLast(1));
  let listenStartTime = Date.now();
  onChildAdded(chatRef, (snap) => {
    const msg = snap.val();
    if (!msg || msg.timestamp < listenStartTime - 2000) return;
    // Remove empty state if present
    const emptyState = messagesArea.querySelector(".empty-state");
    if (emptyState) emptyState.remove();
    messagesArea.insertAdjacentHTML("beforeend", renderMessage(msg));
    scrollToBottom();
  });

  window.sendMessage = async function() {
    const text = input.value.trim();
    if (!text) return;
    const btn = document.getElementById("send-btn");
    btn.disabled = true;
    input.value = "";
    input.style.height = "auto";

    const data = await API.post("/chat/community/message", { text });
    btn.disabled = false;
    if (!data?.success) Toast.error(data?.message || "Failed to send message");
  };

  window.sendImage = async function(inputEl) {
    const file = inputEl.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { Toast.error("Image too large. Max 2MB."); inputEl.value = ""; return; }

    Toast.info("Uploading image...");
    const formData = new FormData();
    formData.append("image", file);
    const data = await API.upload("/chat/community/image", formData);
    inputEl.value = "";
    if (!data?.success) Toast.error(data?.message || "Failed to send image");
  };

  function scrollToBottom() {
    setTimeout(() => { messagesArea.scrollTop = messagesArea.scrollHeight; }, 50);
  }

  window.openLightbox = function(url) {
    document.getElementById("lightbox-img").src = url;
    document.getElementById("lightbox").classList.add("open");
  };
  window.closeLightbox = function() {
    document.getElementById("lightbox").classList.remove("open");
  };

  loadInitialMessages();
  listenStartTime = Date.now();
</script>
</body>
</html>
