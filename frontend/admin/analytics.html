<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"><title>Admin analytics - DET Trades</title><meta name="theme-color" content="#060B18"><link rel="stylesheet" href="/css/style.css"><style>.admin-sidebar{width:220px;min-width:220px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transform:translateX(-100%);transition:transform 0.3s}.admin-sidebar.open{transform:translateX(0)}@media(min-width:768px){.admin-sidebar{transform:translateX(0)}.admin-content{margin-left:220px}}.sidebar-logo{padding:20px 16px;border-bottom:1px solid var(--border)}.sidebar-logo .brand{font-family:var(--font-display);font-size:0.9rem;font-weight:900;color:var(--cyan);letter-spacing:2px}.sidebar-logo .brand span{color:var(--gold)}.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}.sidebar-item{display:flex;align-items:center;gap:10px;padding:11px 16px;font-family:var(--font-display);font-size:0.7rem;letter-spacing:0.5px;color:var(--text-muted);cursor:pointer;transition:all 0.15s;border-left:3px solid transparent;text-decoration:none}.sidebar-item:hover{background:var(--panel2);color:var(--text)}.sidebar-item.active{background:var(--panel2);color:var(--cyan);border-left-color:var(--cyan)}.sidebar-item .icon{font-size:1rem;width:20px;text-align:center}.sidebar-section{padding:8px 16px 4px;font-size:0.6rem;color:var(--text-muted);letter-spacing:2px;font-family:var(--font-display)}.admin-topbar{position:sticky;top:0;background:rgba(6,11,24,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;z-index:100}.topbar-menu-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);font-size:1.1rem;cursor:pointer}@media(min-width:768px){.topbar-menu-btn{display:none}}.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:199}.sidebar-overlay.open{display:block}@media(min-width:768px){.sidebar-overlay{display:none!important}}.admin-table{width:100%;border-collapse:collapse;font-size:0.82rem}.admin-table th{font-family:var(--font-display);font-size:0.65rem;letter-spacing:1px;color:var(--text-muted);padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}.admin-table td{padding:12px;border-bottom:1px solid var(--border);vertical-align:middle}.admin-table tr:hover td{background:var(--panel2)}.table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border);background:var(--panel)}.action-btn{padding:4px 10px;border-radius:4px;font-family:var(--font-display);font-size:0.62rem;letter-spacing:0.5px;cursor:pointer;border:1px solid;transition:all 0.15s}.action-ban{color:var(--danger);border-color:rgba(255,59,92,0.3);background:rgba(255,59,92,0.05)}.action-edit{color:var(--cyan);border-color:var(--cyan-glow);background:var(--cyan-dim)}.action-delete{color:var(--danger);border-color:rgba(255,59,92,0.3);background:transparent}.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}.form-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px}.form-card h3{font-family:var(--font-display);font-size:0.85rem;color:var(--text);margin-bottom:16px;letter-spacing:1px}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:480px){.form-row{grid-template-columns:1fr}}</style></head><body><div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div><aside class="admin-sidebar" id="admin-sidebar"><div class="sidebar-logo"><div class="brand">DET<span>&#9679;</span>TRADES</div><div style="font-size:0.6rem;color:var(--text-muted);letter-spacing:2px;margin-top:2px">ADMIN PANEL</div></div><nav class="sidebar-nav"><div class="sidebar-section">OVERVIEW</div><a href="/admin/index.html" class="sidebar-item" data-page="index.html"><span class="icon">&#9632;</span> Dashboard</a><a href="/admin/analytics.html" class="sidebar-item" data-page="analytics.html"><span class="icon">&#9650;</span> Analytics</a><div class="sidebar-section">USERS</div><a href="/admin/users.html" class="sidebar-item" data-page="users.html"><span class="icon">&#9632;</span> All Users</a><a href="/admin/flagged.html" class="sidebar-item" data-page="flagged.html"><span class="icon">&#9650;</span> Flagged IPs</a><div class="sidebar-section">CONTENT</div><a href="/admin/signals.html" class="sidebar-item" data-page="signals.html"><span class="icon">&#9632;</span> Signals</a><a href="/admin/broadcast.html" class="sidebar-item" data-page="broadcast.html"><span class="icon">&#9632;</span> Broadcast</a><a href="/admin/support.html" class="sidebar-item" data-page="support.html"><span class="icon">&#9632;</span> Support</a><div class="sidebar-section">BILLING</div><a href="/admin/pricing.html" class="sidebar-item" data-page="pricing.html"><span class="icon">&#9632;</span> Pricing</a><a href="/admin/coupons.html" class="sidebar-item" data-page="coupons.html"><span class="icon">&#9632;</span> Coupons</a><div class="sidebar-section">SETTINGS</div><a href="/admin/settings.html" class="sidebar-item" data-page="settings.html"><span class="icon">&#9632;</span> App Settings</a></nav><div style="padding:12px 16px;border-top:1px solid var(--border)"><a href="/dashboard.html" class="sidebar-item" style="padding:8px 0;border:none">Back to App</a></div></aside><div class="admin-content"><div class="admin-topbar"><div style="display:flex;align-items:center;gap:12px"><button class="topbar-menu-btn" onclick="toggleSidebar()">&#9776;</button><div style="font-family:var(--font-display);font-size:0.85rem;font-weight:700" id="page-title">analytics</div></div><div class="nav-avatar" id="admin-avatar" style="border-color:var(--gold)">A</div></div><div style="padding:20px 16px" id="page-content"><div style="text-align:center;padding:40px"><div class="spinner spinner-lg"></div></div></div></div><div id="toast-container"></div><script src="/js/config.js"></script><script src="/js/app.js"></script><script>if(!Auth.requireAuth())throw new Error("r");if(!Auth.isAdmin()){window.location.href="/dashboard.html";throw new Error("na");}const u=Auth.getUser();const av=document.getElementById("admin-avatar");if(u.avatar_url)av.innerHTML="<img src="+u.avatar_url+" style=width:100%;height:100%;object-fit:cover;border-radius:50%>";else av.textContent=u.username?.charAt(0)?.toUpperCase()||"A";const pg=window.location.pathname.split("/").pop();document.querySelectorAll(".sidebar-item").forEach(el=>el.classList.toggle("active",el.dataset.page===pg));function toggleSidebar(){document.getElementById("admin-sidebar").classList.toggle("open");document.getElementById("sidebar-overlay").classList.toggle("open");}function closeSidebar(){document.getElementById("admin-sidebar").classList.remove("open");document.getElementById("sidebar-overlay").classList.remove("open");}</script><script src="/admin/pages/analytics.js"></script></body></html>
